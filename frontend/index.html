        .header h2 {

        .header p {
            font-size: 12px;

            margin-top: 2px;

            overflow-y: auto;

        .message.user {
            align-self: flex-end;

        }

        .message.assistant {
            align-self: flex-start;
        }
 */
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .avatar.user-avatar {
            background: #e8f0fe;
        }

        .avatar.bot-avatar {
            background: #1a73e8;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            max-width: 100%;
            word-wrap: break-word;
        }

        .message.user .bubble {
            background: #1a73e8;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .bubble {
            background: #f8f9fa;
            color: #333;
            border-bottom-left-radius: 4px;
            border: 1px solid #eee;
        }

        .department-tag {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
        }

        .tag-shipping  { background: #e8f5e9; color: #2e7d32; }
        .tag-returns   { background: #fff3e0; color: #e65100; }
        .tag-billing   { background: #e3f2fd; color: #1565c0; }
        .tag-account   { background: #f3e5f5; color: #6a1b9a; }
        .tag-unknown   { background: #f5f5f5; color: #666; }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            background: #f8f9fa;
            padding: 12px 16px;
            border-radius: 18px;
            border: 1px solid #eee;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #aaa;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }

        .input-area {
            padding: 16px 24px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: white;
        }

        #messageInput {
            flex: 1;
            border: 1.5px solid #e0e0e0;
            border-radius: 24px;
            padding: 12px 18px;
            font-size: 14px;
            outline: none;
            resize: none;
            font-family: inherit;
            max-height: 120px;
            transition: border-color 0.2s;
        }

        #messageInput:focus {
            border-color: #1a73e8;
        }

        #messageInput::placeholder {
            color: #aaa;
        }

        #sendButton {
            width: 46px;
            height: 46px;
            background: #1a73e8;
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }

        #sendButton:hover { background: #1557b0; }
        #sendButton:active { transform: scale(0.95); }
        #sendButton:disabled { background: #ccc; cursor: not-allowed; }

        .suggestions {
            padding: 0 24px 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .suggestion-btn {
            background: #f0f4ff;
            color: #1a73e8;
            border: 1px solid #d0e0ff;
            border-radius: 16px;
            padding: 6px 14px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .suggestion-btn:hover {
            background: #1a73e8;
            color: white;
        }

        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }

        .welcome-message .emoji { font-size: 48px; margin-bottom: 12px; }
        .welcome-message h3 { color: #333; margin-bottom: 8px; }
        .welcome-message p { font-size: 14px; line-height: 1.6; }
    </style>
</head>

<body>
<div class="chat-container">

    <div class="header">
        <div class="header-left">
            <div class="bot-avatar">🛒</div>
            <div>
                <h2>ShopEasy Support</h2>
                <p>AI-Powered Customer Support</p>
            </div>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
            <!-- This badge updates to show which agent is active -->
            <span class="agent-badge" id="agentBadge">Multi-Agent System</span>
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>Online</span>
            </div>
        </div>
    </div>

    <!-- MESSAGES AREA -->
    <div class="messages-area" id="messagesArea">

        <!-- Welcome message shown on load -->
        <div class="welcome-message" id="welcomeMessage">
            <div class="emoji">👋</div>
            <h3>Welcome to Customer Support System!</h3>
            <p>
                Our AI system routes your question to the right specialist automatically.<br>
                Ask about <strong>shipping</strong>, <strong>returns</strong>,
                <strong>billing</strong>, or your <strong>account</strong>.
            </p>
        </div>

    </div>

    <!-- SUGGESTED QUESTIONS -->
    <div class="suggestions" id="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion('Where is my order?')"> Where is my order?</button>
        <button class="suggestion-btn" onclick="sendSuggestion('How do I return an item?')">↩ Return an item</button>
        <button class="suggestion-btn" onclick="sendSuggestion('My payment failed')"> Payment failed</button>
        <button class="suggestion-btn" onclick="sendSuggestion('I forgot my password')"> Forgot password</button>
    </div>

    <!-- INPUT AREA -->
    <div class="input-area">
        <textarea
            id="messageInput"
            placeholder="Ask ShopBot anything..."
            rows="1"
        ></textarea>
        <button id="sendButton" onclick="sendMessage()">➤</button>
    </div>

</div>

<script>
    const API_URL = "http://localhost:8000/chat";
    let chatHistory = [];

    const messagesArea = document.getElementById("messagesArea");
    const messageInput = document.getElementById("messageInput");
    const sendButton  = document.getElementById("sendButton");

    messageInput.addEventListener("input", function () {
        this.style.height = "auto";
        this.style.height = Math.min(this.scrollHeight, 120) + "px";
    });

    messageInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();   
            sendMessage();
        }
    });

    function sendSuggestion(text) {
        messageInput.value = text;
        sendMessage();
    }

    function addMessage(content, role, category = "") {

        
        const welcome = document.getElementById("welcomeMessage");
        if (welcome) welcome.style.display = "none";

        document.getElementById("suggestions").style.display = "none";

        const messageDiv = document.createElement("div");
        messageDiv.className = `message ${role}`;

        const avatarDiv = document.createElement("div");
        avatarDiv.className = `avatar ${role === "user" ? "user-avatar" : "bot-avatar"}`;
        avatarDiv.textContent = role === "user" ? "👤" : "🤖";

        const bubbleContainer = document.createElement("div");

        if (role === "assistant" && category) {
            const tagDiv = document.createElement("div");
            tagDiv.className = `department-tag tag-${category}`;

            const labels = {
                shipping: " Shipping Agent",
                returns:  " Returns Agent",
                billing:  " Billing Agent",
                account:  " Account Agent"
            };
            tagDiv.textContent = labels[category] || "🤖 Support Agent";
            bubbleContainer.appendChild(tagDiv);
        }

        const bubble = document.createElement("div");
        bubble.className = "bubble";

        bubble.innerHTML = content.replace(/\n/g, "<br>");

        bubbleContainer.appendChild(bubble);
        messageDiv.appendChild(avatarDiv);
        messageDiv.appendChild(bubbleContainer);
        messagesArea.appendChild(messageDiv);

        messagesArea.scrollTop = messagesArea.scrollHeight;
    }


    function showTyping() {
        const typingDiv = document.createElement("div");
        typingDiv.id = "typingIndicator";
        typingDiv.className = "message assistant typing-indicator";

        const avatar = document.createElement("div");
        avatar.className = "avatar bot-avatar";
        avatar.textContent = "🤖";

        const dots = document.createElement("div");
        dots.className = "typing-dots";
        dots.innerHTML = "<span></span><span></span><span></span>";

        typingDiv.appendChild(avatar);
        typingDiv.appendChild(dots);
        messagesArea.appendChild(typingDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function hideTyping() {
        const typing = document.getElementById("typingIndicator");
        if (typing) typing.remove();
    }

    function updateAgentBadge(category) {
        const badge = document.getElementById("agentBadge");
        const labels = {
            shipping: " Shipping Agent Active",
            returns:  " Returns Agent Active",
            billing:  " Billing Agent Active",
            account:  " Account Agent Active"
        };
        badge.textContent = labels[category] || "Multi-Agent System";
    }

    async function sendMessage() {

        const userMessage = messageInput.value.trim();
    
        if (!userMessage) return;

        messageInput.value = "";
        messageInput.style.height = "auto";

        sendButton.disabled = true;

        addMessage(userMessage, "user");

        showTyping();

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    user_message: userMessage,
                    chat_history: chatHistory
                })
            });

            if (!response.ok) {
                throw new Error(`Server error: ${response.status}`);
            }

            const data = await response.json();

            hideTyping();
            addMessage(data.response, "assistant", data.category);

            updateAgentBadge(data.category);

            chatHistory.push({ role: "user",      content: userMessage });
            chatHistory.push({ role: "assistant", content: data.response });

        } catch (error) {
            hideTyping();
            addMessage(
                "Sorry, I couldn't connect to the server. Please make sure the FastAPI server is running.",
                "assistant",
                ""
            );
            console.error("API Error:", error);
        }
        sendButton.disabled = false;
        messageInput.focus();
    }
</script>

</body>
</html>
